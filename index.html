<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Soma ❤️</title><style>

body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
background:black;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
font-size:50px;
color:#ff66cc;
text-shadow:0 0 25px pink;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
margin-top:20px;
}

#gift{
font-size:70px;
display:none;
cursor:pointer;
margin-top:20px;
}

#cake{
font-size:80px;
display:none;
cursor:pointer;
}

#letter{
display:none;
max-width:700px;
font-size:20px;
margin-top:20px;
white-space:pre-line;
}

.heart{
position:fixed;
font-size:24px;
color:red;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

.explode{
position:fixed;
font-size:30px;
animation:boom 1s forwards;
}

@keyframes boom{
0%{transform:scale(0);}
100%{transform:scale(3); opacity:0;}
}

</style></head><body><h1>🎂 Happy Birthday Soma ❤️</h1><button onclick="start()">Start Surprise</button>

<div id="gift" onclick="showCake()">🎁</div><div id="cake" onclick="cutCake()">🎂</div><div id="letter"></div><canvas id="stars"></canvas>

<script>

function start(){
document.querySelector("button").style.display="none";
document.getElementById("gift").style.display="block";
heartRain();
}

function showCake(){
document.getElementById("gift").style.display="none";
document.getElementById("cake").style.display="block";
}

function cutCake(){

heartExplosion();

const text=`My Dearest Soma ❤️

The day you came into my life,
everything started feeling magical.

Your smile brightens my darkest days,
and your presence makes my world complete.

This one year of friendship with you
has been one of the most beautiful parts of my life.

You are special,
you are amazing,
and you deserve all the happiness in the world.

💖 Happy Birthday Soma 💖

May your life always be filled
with love, joy and success.

Forever grateful for you ❤️`;

let i=0;
let letter=document.getElementById("letter");

letter.style.display="block";

function typing(){
if(i<text.length){
letter.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();
fireworks();

}

function heartRain(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
},300);
}

function heartExplosion(){
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.className="explode";
h.innerHTML="💖";
h.style.left=Math.random()*window.innerWidth+"px";
h.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
}
}

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);
}

drawStars();

setInterval(()=>{

let star=document.createElement("div");

star.style.position="fixed";
star.style.width="2px";
star.style.height="80px";
star.style.background="white";

star.style.left=Math.random()*window.innerWidth+"px";
star.style.top="-100px";

star.style.transform="rotate(45deg)";
star.style.opacity="0.8";

document.body.appendChild(star);

let pos=0;

let fall=setInterval(()=>{

pos+=20;
star.style.top=pos+"px";

if(pos>window.innerHeight){
clearInterval(fall);
star.remove();
}

},30);

},1500);

function fireworks(){

setInterval(()=>{

for(let i=0;i<25;i++){

let spark=document.createElement("div");

spark.style.position="fixed";
spark.style.width="6px";
spark.style.height="6px";
spark.style.background="yellow";
spark.style.borderRadius="50%";

spark.style.left=Math.random()*window.innerWidth+"px";
spark.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),800);

}

},400);

}

</script></body>
</html>
